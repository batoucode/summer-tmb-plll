<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>TMB — Summer Book 2026-2027</title>
<meta name="description" content="Plateforme de suivi de la préparation physique estivale du TMB — admin, coachs et joueurs.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header id="topbar" class="topbar hidden">
  <div class="topbar-brand">
    <span class="topbar-ball"><img src="https://toursmetropolebasket.com/wp-content/themes/utbm/build/svg/logoUTBM.svg" alt="TMB" class="topbar-logo-img"></span>
    <div class="topbar-titles">
      <div class="name">Summer Book</div>
      <div class="sub">TMB · 2026-2027</div>
    </div>
  </div>
  <div class="topbar-user">
    <span id="topbarUserName" class="user-name"></span>
    <span id="topbarUserRole" class="role-badge"></span>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main id="appRoot">
  <section id="view-auth" class="view"></section>
  <section id="view-admin" class="view hidden"></section>
  <section id="view-coach" class="view hidden"></section>
  <section id="view-player" class="view hidden"></section>
</main>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
