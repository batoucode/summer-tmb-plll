<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>TMB — Summer Book 2026-2027</title>
<meta name="description" content="Suivi de la préparation physique estivale du TMB — saison 2026-2027.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app" id="app">

  <div class="app-header">
    <div class="crest">TMB</div>
    <div class="brand-text">
      <div class="name">Summer Book</div>
      <div class="sub">Préparation physique estivale</div>
    </div>
    <div class="season-badge">2026-27</div>
  </div>

  <div class="chevalier-top" id="chevalierQuoteTop"></div>

  <div class="golden-rules" id="goldenRules"></div>

  <div class="section-title">Choisis ta catégorie</div>
  <div class="cat-selector" id="categorySelector"></div>

  <div class="overview-card">
    <div class="overview-top">
      <div class="ring" id="overviewRing"><div class="ring-inner" id="overviewPct">0%</div></div>
      <div class="overview-labels">
        <div class="title">Progression du programme</div>
        <div class="sub" id="overviewSub">0 / 0 séances validées</div>
      </div>
    </div>
    <div class="week-dots" id="overviewWeeks"></div>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <div class="week-tabs" id="weekTabs"></div>
  <div id="weekContent"></div>

  <div class="outro-card" id="outroCard"></div>

  <div class="reset-all-wrap">
    <button class="btn-reset-all" id="resetAllBtn">Réinitialiser toute la progression</button>
  </div>

  <div class="descodes-footer">
    <a href="https://descodes.com" target="_blank" rel="noopener">
      <span>Site réalisé par</span>
      <span class="code-icon">&lt;/&gt;</span>
      <span class="brand-des">DES</span><span class="brand-codes">CODES</span>
    </a>
  </div>

</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
